general {
    lock_cmd = pidof hyprlock || hyprlock --grace 5       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session && sleep 3
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
    ignore_wayland_inhibit = false
    inhibit_sleep = 3
}

listener {
    timeout = 150                                # 2.5min.
    on-timeout = brightnessctl -s set "$(awk -v c="$(brightnessctl g)" -v m="$(brightnessctl m)" 'BEGIN{h=int(c/2); min=int(m*0.05); print (h<min?min:h)}')"        # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                 # monitor backlight restore.
}

# turn off keyboard backlight, comment out this section if you dont have a keyboard backlight.
# listener { 
#     timeout = 150                                          # 2.5min.
#     on-timeout = brightnessctl -sd rgb:kbd_backlight set 0 # turn off keyboard backlight.
#     on-resume = brightnessctl -rd rgb:kbd_backlight        # turn on keyboard backlight.
# }

listener {
    timeout = 300                                 # 5min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

listener {
    timeout = 290                                                     # 4.8min
    on-timeout = hyprctl dispatch dpms off                            # screen off when timeout has passed
    on-resume = hyprctl dispatch dpms on && brightnessctl -r          # screen on when activity is detected after timeout has fired.
}

# AC power
listener {
    timeout = 720
    on-timeout = systemd-ac-power && systemctl suspend # AC power
}

# Battery power
listener {
    timeout = 400
    on-timeout = systemd-ac-power || systemctl suspend # Battery power
}
